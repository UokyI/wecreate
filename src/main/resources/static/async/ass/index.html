<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异步测试 - WeCreate</title>
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --container-bg: #ffffff;
            --text-color: #000000;
            --border-color: #ddd;
            --header-border: #ddd;
            --user-info-bg: #f0f8ff;
            --path-info-bg: #fff8dc;
            --warning-bg: #fcf8e3;
            --warning-border: #ff9800;
            --input-border: #ddd;
            --btn-primary-bg: #007bff;
            --btn-primary-hover: #0056b3;
            --btn-disabled-bg: #ccc;
            --output-border: #ddd;
            --message-info-bg: #e7f3ff;
            --message-info-border: #2196F3;
            --message-complete-bg: #dff0d8;
            --message-complete-border: #4CAF50;
            --message-success-bg: #dff0d8;
            --message-success-border: #4CAF50;
            --message-error-bg: #f2dede;
            --message-error-border: #F44336;
            --message-warning-bg: #fff3cd;
            --message-warning-border: #ffc107;
        }

        .dark-theme {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --border-color: #555;
            --header-border: #555;
            --user-info-bg: #3d3d3d;
            --path-info-bg: #4a3c00;
            --warning-bg: #4a3c00;
            --warning-border: #ff9800;
            --input-border: #555;
            --btn-primary-bg: #0069d9;
            --btn-primary-hover: #0062cc;
            --btn-disabled-bg: #555;
            --output-border: #555;
            --message-info-bg: #1e3a5f;
            --message-info-border: #2196F3;
            --message-complete-bg: #1e4a1e;
            --message-complete-border: #4CAF50;
            --message-success-bg: #1e4a1e;
            --message-success-border: #4CAF50;
            --message-error-bg: #5c1e1e;
            --message-error-border: #F44336;
            --message-warning-bg: #4a3c00;
            --message-warning-border: #ffc107;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--header-border);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
            background: var(--user-info-bg);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        .path-info {
            background: var(--path-info-bg);
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid var(--warning-border);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #userInput {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 14px;
        }

        #userInput:focus {
            outline: none;
            border-color: var(--btn-primary-bg);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: white;
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
        }

        .btn:disabled {
            background: var(--btn-disabled-bg);
            cursor: not-allowed;
        }

        .output {
            border: 1px solid var(--output-border);
            border-radius: 5px;
            padding: 15px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            background: var(--container-bg);
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid;
        }

        .message.info {
            background: var(--message-info-bg);
            border-color: var(--message-info-border);
        }

        .message.complete {
            background: var(--message-complete-bg);
            border-color: var(--message-complete-border);
        }

        .message.success {
            background: var(--message-success-bg);
            border-color: var(--message-success-border);
        }

        .message.error {
            background: var(--message-error-bg);
            border-color: var(--message-error-border);
        }

        .message.warning {
            background: var(--message-warning-bg);
            border-color: var(--message-warning-border);
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-left">
                <a href="/list.html" class="navbar-logo">
                    <span>🚀</span>
                    <span>WeCreate</span>
                </a>
                <div class="navbar-menu" id="navbarMenu">
                    <a href="/index.html" class="navbar-menu-item">
                        <span class="icon">📁</span>
                        <span>项目管理</span>
                    </a>
                    <a href="/excrecord.html" class="navbar-menu-item">
                        <span class="icon">💬</span>
                        <span>执行记录</span>
                    </a>
                    <a href="/pro/index.html" class="navbar-menu-item">
                        <span class="icon">📤</span>
                        <span>派发任务</span>
                    </a>
                    <a href="/async/ass/index.html" class="navbar-menu-item active" style="display: none;">
                        <span class="icon">⚡</span>
                        <span>异步测试</span>
                    </a>
                    <a href="/debug.html" class="navbar-menu-item" style="display: none;">
                        <span class="icon">🐛</span>
                        <span>日志调试</span>
                    </a>
                    <a href="/lan.html" class="navbar-menu-item">
                        <span class="icon">📡</span>
                        <span>局域网访问</span>
                    </a>
                    <a href="/settings.html" class="navbar-menu-item">
                        <span class="icon">⚙️</span>
                        <span>系统配置</span>
                    </a>
                </div>
            </div>
            <div class="navbar-right">
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleDarkTheme()" title="切换主题 (F8)">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
            <div class="navbar-toggle" onclick="toggleNavbarMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="header">
            <h1>异步测试</h1>
            <div class="user-info">
                <div class="info-item">IP: <span id="ip">加载中...</span></div>
            </div>
        </div>

        <div class="container">
            <div class="input-section">
                <h2>输入需求描述</h2>
                <textarea id="requestInput" placeholder="输入需求..."></textarea>
                <button id="executeBtn">执行</button>
            </div>

            <div class="output-section">
                <h2>执行结果</h2>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <!-- 引入导航栏 JS -->
    <script src="../../js/navbar.js"></script>
</body>
</html>
