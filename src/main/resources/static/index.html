<!DOCTYPE html>

<head>

    <style>
        /* 卡片头部按钮样式 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header .btn-primary {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 14px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-header .btn-primary span {
            font-size: 16px;
        }

        /* 操作按钮样式 */
        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .action-btn-edit {
            background: #1890ff;
            color: white;
        }

        .action-btn-edit:hover {
            background: #40a9ff;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(24, 144, 255, 0.3);
        }

        .action-btn-edit:active {
            background: #096dd9;
            transform: translateY(0);
        }

        .action-btn-reclone {
            background: #52c41a;
            color: white;
        }

        .action-btn-reclone:hover {
            background: #73d13d;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(82, 196, 26, 0.3);
        }

        .action-btn-reclone:active {
            background: #52c41a;
            transform: translateY(0);
        }

        .action-btn-delete {
            background: #ff4d4f;
            color: white;
        }

        .action-btn-delete:hover {
            background: #ff7875;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(255, 77, 79, 0.3);
        }

        .action-btn-delete:active {
            background: #ff4d4f;
            transform: translateY(0);
        }

        .action-btn-execute {
            background: #722ed1;
            color: white;
        }

        .action-btn-execute:hover {
            background: #9254de;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(114, 46, 209, 0.3);
        }

        .action-btn-execute:active {
            background: #722ed1;
            transform: translateY(0);
        }

        /* 记忆按钮样式 */
        .action-btn-memory {
            background: #13c2c2;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
        }

        .action-btn-memory:hover {
            background: #36cfc9;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(19, 194, 194, 0.3);
        }

        .action-btn-memory:active {
            background: #13c2c2;
            transform: translateY(0);
        }

        .action-btn-memory-import {
            background: #fa8c16;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
        }

        .action-btn-memory-import:hover {
            background: #ffa940;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(250, 140, 22, 0.3);
        }

        .action-btn-memory-import:active {
            background: #fa8c16;
            transform: translateY(0);
        }

        /* 按钮禁用状态 */
        .action-btn:disabled {
            background: #d9d9d9 !important;
            color: #999 !important;
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 暗色主题适配 */
        body.dark-theme .action-btn-edit {
            background: #1890ff;
        }

        body.dark-theme .action-btn-reclone {
            background: #52c41a;
        }

        body.dark-theme .action-btn-delete {
            background: #ff4d4f;
        }

        /* 表格单元格优化 */
        .table td:nth-child(2),
        .table td:nth-child(3),
        .table td:nth-child(4) {
            max-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 悬停时显示完整内容 */
        .table td:nth-child(2):hover,
        .table td:nth-child(3):hover,
        .table td:nth-child(4):hover {
            white-space: normal;
            word-break: break-all;
        }

        /* 创建时间列不换行 */
        .table td:nth-child(6),
        .table th:nth-child(6) {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>

    <!-- 主体内容 -->
    <div class="main-container">
        <!-- 页面标题 -->
<!--        <div class="page-header">-->
<!--            <h1 class="page-title">项目管理</h1>-->
<!--            <p class="page-subtitle">管理 Git 项目，自动 clone 到本地工作区</p>-->
<!--        </div>-->
        <!-- 项目列表表格 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">项目列表</h2>
                <button class="btn btn-primary" onclick="openAddProjectModal()">
                    <span>➕</span> 新增项目
                </button>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="display: none;">ID</th>
                                <th style="width: 120px;">项目名称</th>
                                <th style="width: 280px;">Git 地址</th>
                                <th style="width: 320px;">工作路径</th>
                                <th style="width: 90px;">状态</th>
                                <th style="width: 170px;">创建时间</th>
                                <th style="width: 120px;">记忆</th>
                                <th style="width: 430px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="projectTableBody">
                            <tr>
                                <td colspan="9" class="loading">加载中</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增项目模态框 -->
    <div id="addModal" class="modal">
        <div class="modal-content" style="height: auto; max-height: 70vh; width: 600px; max-width: 90%;">
            <div class="modal-header" style="padding: 15px 20px;">
                <h2 style="font-size: 1.3em; margin: 0;">新增项目</h2>
                <span class="close" onclick="closeAddModal()">&times;</span>
            </div>
            <div class="modal-body" style="padding: 20px; height: auto; max-height: calc(70vh - 60px);">
                <form id="addProjectForm">
                    <input type="hidden" id="addProjectId">
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="addGitUrl" class="required">Git 仓库地址</label>
                        <input type="text" id="addGitUrl" placeholder="例如：https://github.com/user/repo.git 或 git@github.com:user/repo.git" onchange="extractAddProjectName()">
                    </div>
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="addProjectName">项目名称</label>
                        <input type="text" id="addProjectName" placeholder="自动从 Git 地址提取（可手动修改）" readonly>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="addDescription">项目描述</label>
                        <textarea id="addDescription" placeholder="请输入项目描述（可选）" rows="3"></textarea>
                    </div>
                    <div class="btn-group" style="margin-top: 0; display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" class="btn btn-default" onclick="closeAddModal()">取消</button>
                        <button type="submit" class="btn btn-primary" id="addSubmitBtn">创建项目</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 编辑项目模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑项目</h2>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="editProjectId">
                    <div class="form-group">
                        <label for="editGitUrl" class="required">Git 仓库地址</label>
                        <input type="text" id="editGitUrl" onchange="extractEditProjectName()">
                    </div>
                    <div class="form-group">
                        <label for="editProjectName">项目名称</label>
                        <input type="text" id="editProjectName" placeholder="自动从 Git 地址提取（可手动修改）">
                    </div>
                    <div class="form-group">
                        <label for="editDescription">项目描述</label>
                        <textarea id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editRemark">备注</label>
                        <textarea id="editRemark" rows="2"></textarea>
                    </div>
                    <div class="btn-group" style="margin-top: 20px;">
                        <button type="button" class="btn btn-default" onclick="closeEditModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 导入记忆模态框 -->
    <div id="importMemoryModal" class="modal">
        <div class="modal-content" style="width: 500px; max-width: 90%;">
            <div class="modal-header">
                <h2>覆盖项目记忆</h2>
                <span class="close" onclick="closeImportMemoryModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 16px; padding: 12px; background: #fff7e6; border-radius: 6px; border-left: 3px solid #fa8c16;">
                    <strong>⚠️ 注意：</strong>上传后将覆盖当前项目的所有记忆文件，请谨慎操作。
                </div>
                <div class="form-group">
                    <label for="importMemoryFile" class="required">选择记忆 ZIP 文件</label>
                    <input type="file" id="importMemoryFile" accept=".zip" onchange="handleFileSelect(this)">
                    <div id="importFileInfo" style="margin-top: 8px; font-size: 13px; color: #666;"></div>
                </div>
                <div class="btn-group" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-default" onclick="closeImportMemoryModal()">取消</button>
                    <button type="button" class="btn btn-primary" id="importMemorySubmitBtn" onclick="submitImportMemory()" disabled>确认覆盖</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 基础路径
        const API_BASE = '/api/projects';

        // 状态映射
        const STATUS_MAP = {
            0: { text: '未克隆', class: 'status-0' },
            1: { text: '已克隆', class: 'status-1' },
            2: { text: '克隆失败', class: 'status-2' }
        };

        // 从 Git URL 提取项目名称（新增弹窗用）
        function extractAddProjectName() {
            const gitUrl = document.getElementById('addGitUrl').value.trim();
            const projectNameInput = document.getElementById('addProjectName');

            if (!gitUrl) {
                projectNameInput.value = '';
                return;
            }

            try {
                let projectName = '';

                // 处理 SSH 格式：git@github.com:user/repo.git
                if (gitUrl.startsWith('git@')) {
                    const parts = gitUrl.split(':');
                    if (parts.length > 1) {
                        const pathParts = parts[1].split('/');
                        projectName = pathParts[pathParts.length - 1].replace('.git', '');
                    }
                }
                // 处理 HTTPS 格式：https://github.com/user/repo.git
                else if (gitUrl.startsWith('http://') || gitUrl.startsWith('https://')) {
                    const urlParts = gitUrl.replace('.git', '').split('/');
                    projectName = urlParts[urlParts.length - 1];
                }
                // 处理其他格式，尝试从最后一个斜杠提取
                else {
                    const parts = gitUrl.replace('.git', '').split('/');
                    projectName = parts[parts.length - 1];
                }

                // 清理项目名称（移除可能的特殊字符）
                projectName = projectName.replace(/[^a-zA-Z0-9_-]/g, '');

                if (projectName) {
                    projectNameInput.value = projectName;
                } else {
                    projectNameInput.value = '';
                }
            } catch (e) {
                console.error('提取项目名称失败:', e);
                projectNameInput.value = '';
            }
        }

        // 打开新增项目弹窗
        function openAddProjectModal() {
            document.getElementById('addProjectForm').reset();
            document.getElementById('addProjectId').value = '';
            document.getElementById('addModal').classList.add('show');
        }

        // 关闭新增项目弹窗
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        // 关闭编辑项目弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        // 点击弹窗外部关闭弹窗
        window.addEventListener('click', function(event) {
            const addModal = document.getElementById('addModal');
            const editModal = document.getElementById('editModal');
            
            if (event.target === addModal) {
                closeAddModal();
            }
            if (event.target === editModal) {
                closeEditModal();
            }
        });

        // 新增项目表单提交
        document.getElementById('addProjectForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const gitUrl = document.getElementById('addGitUrl').value.trim();
            const projectName = document.getElementById('addProjectName').value.trim();
            const description = document.getElementById('addDescription').value.trim();

            console.log('提交数据:', {
                projectName: projectName || null,
                gitUrl: gitUrl,
                description: description || null
            });

            if (!gitUrl) {
                showMessage('请输入 Git 仓库地址', 'error');
                return;
            }

            const projectData = {
                projectName: projectName || null,
                gitUrl: gitUrl,
                description: description || null
            };

            const submitBtn = document.getElementById('addSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '创建中...';

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(projectData)
                });

                console.log('响应状态:', response.status);

                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    const result = await response.json();
                    console.log('响应数据:', result);

                    if (result.code === 200) {
                        showMessage('项目创建成功！', 'success');
                        closeAddModal();
                        loadProjects();
                    } else {
                        showMessage('创建失败：' + result.msg, 'error');
                    }
                } else {
                    const text = await response.text();
                    console.error('非 JSON 响应:', text);
                    showMessage('服务器响应格式错误', 'error');
                }
            } catch (error) {
                console.error('创建项目失败:', error);
                showMessage('创建失败：' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '创建项目';
            }
        });

        // 页面加载时获取项目列表
        document.addEventListener('DOMContentLoaded', function() {
            loadProjects();
        });

        // 加载项目列表
        async function loadProjects() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) {
                    showMessage('加载项目列表失败：HTTP ' + response.status, 'error');
                    return;
                }
                const result = await response.json();

                if (result.code === 200) {
                    renderProjectTable(result.data || []);
                } else {
                    console.error('后端返回错误:', result);
                    showMessage('加载项目列表失败：' + (result.msg || '未知错误'), 'error');
                }
            } catch (error) {
                console.error('加载项目列表失败:', error);
                showMessage('加载失败：网络异常或数据格式错误', 'error');
            }
        }

        // 渲染项目表格
        function renderProjectTable(projects) {
            const tbody = document.getElementById('projectTableBody');

            if (!projects || projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #999;">暂无项目数据</td></tr>';
                return;
            }

            // 确保 ID 是字符串格式，避免精度丢失
            const projectsWithStringId = projects.map(p => ({
                ...p,
                id: String(p.id)
            }));

            tbody.innerHTML = projectsWithStringId.map(project => `
                <tr>
                    <td style="display: none;">${project.id}</td>
                    <td>${escapeHtml(project.projectName)}</td>
                    <td>${escapeHtml(project.gitUrl)}</td>
                    <td>${escapeHtml(project.localPath)}</td>
                    <td><span class="status-badge ${STATUS_MAP[project.status].class}">${STATUS_MAP[project.status].text}</span></td>
                    <td>${formatDate(project.createTime)}</td>
                    <td>
                        <div class="memory-btns" style="display: flex; gap: 6px; flex-wrap: nowrap; justify-content: center;">
                            <button class="action-btn action-btn-memory" onclick="exportMemory('${project.id}', '${escapeHtml(project.projectName)}')" title="导出记忆" style="padding: 6px 10px; font-size: 12px;">
                                📥 导出
                            </button>
                            <button class="action-btn action-btn-memory-import" onclick="openImportMemoryModal('${project.id}', '${escapeHtml(project.projectName)}')" title="覆盖记忆" style="padding: 6px 10px; font-size: 12px;">
                                📤 覆盖
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn action-btn-execute" onclick="executeProject('${project.id}', '${escapeHtml(project.localPath)}')">执行</button>
                            <button class="action-btn action-btn-edit" onclick="openEditModal('${project.id}')">编辑</button>
                            <button class="action-btn action-btn-reclone" onclick="recloneProject('${project.id}')">重新克隆</button>
                            <button class="action-btn action-btn-delete" onclick="deleteProject('${project.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 打开编辑模态框
        async function openEditModal(id) {
            try {
                // 处理 ID，去除可能的小数部分
                const cleanId = String(id).split('.')[0];
                const response = await fetch(`${API_BASE}/${cleanId}`);
                const result = await response.json();

                if (result.code === 200) {
                    const project = result.data;
                    document.getElementById('editProjectId').value = project.id;
                    document.getElementById('editProjectName').value = project.projectName || '';
                    document.getElementById('editGitUrl').value = project.gitUrl || '';
                    document.getElementById('editDescription').value = project.description || '';
                    document.getElementById('editRemark').value = project.remark || '';
                    
                    document.getElementById('editModal').classList.add('show');
                } else {
                    showMessage('获取项目信息失败：' + result.msg, 'error');
                }
            } catch (error) {
                console.error('获取项目信息失败:', error);
                showMessage('获取失败：' + error.message, 'error');
            }
        }

        // 编辑表单提交
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const projectData = {
                id: document.getElementById('editProjectId').value,
                projectName: document.getElementById('editProjectName').value.trim(),
                gitUrl: document.getElementById('editGitUrl').value.trim(),
                description: document.getElementById('editDescription').value.trim(),
                remark: document.getElementById('editRemark').value.trim()
            };

            if (!projectData.projectName || !projectData.gitUrl) {
                showMessage('项目名称和 Git 地址不能为空', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(projectData)
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('更新成功！', 'success');
                    closeEditModal();
                    loadProjects();
                } else {
                    showMessage('更新失败：' + result.msg, 'error');
                }
            } catch (error) {
                console.error('更新项目失败:', error);
                showMessage('更新失败：' + error.message, 'error');
            }
        });

        // 删除项目
        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？此操作将同时删除本地项目文件，且无法恢复！')) {
                return;
            }

            try {
                // 处理 ID，去除可能的小数部分（因为后端使用 BigDecimal）
                const cleanId = String(id).split('.')[0];
                console.log('删除项目 ID:', cleanId);
                
                const response = await fetch(`${API_BASE}/${cleanId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                // 检查是否是 HTML 响应（错误页面）
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/html')) {
                    console.error('收到 HTML 响应，可能是 404 或 500 错误页面');
                    showMessage('删除失败：服务器错误', 'error');
                    return;
                }

                const result = await response.json();

                console.log('删除响应:', result);

                if (result.code === 200) {
                    showMessage('删除成功！', 'success');
                    loadProjects();
                } else {
                    showMessage('删除失败：' + result.msg, 'error');
                }
            } catch (error) {
                console.error('删除项目失败:', error);
                showMessage('删除失败：' + error.message, 'error');
            }
        }

        // 重新克隆项目
        async function recloneProject(id) {
            if (!confirm('确定要重新克隆这个项目吗？此操作将删除本地现有项目并重新 clone。')) {
                return;
            }

            try {
                // 处理 ID，去除可能的小数部分
                const cleanId = String(id).split('.')[0];
                const response = await fetch(`${API_BASE}/${cleanId}/reclone`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('重新克隆成功！', 'success');
                    loadProjects();
                } else {
                    showMessage('重新克隆失败：' + result.msg, 'error');
                }
            } catch (error) {
                console.error('重新克隆失败:', error);
                showMessage('重新克隆失败：' + error.message, 'error');
            }
        }

        // 执行项目（跳转到 派发任务并设置项目ID）
        function executeProject(id, localPath) {
            if (!localPath) {
                showMessage('项目本地路径不存在', 'error');
                return;
            }

            // 跳转到 派发任务，附带项目ID参数
            const cliUrl = `/pro/index.html?projectId=${encodeURIComponent(id)}`;
            console.log('跳转到 派发任务:', cliUrl);
            window.location.href = cliUrl;
        }

        // 显示消息提示
        function showMessage(message, type = 'success') {
            const existingMessage = document.querySelector('.message');
            if (existingMessage) {
                existingMessage.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const editModal = document.getElementById('editModal');
            const importMemoryModal = document.getElementById('importMemoryModal');
            if (event.target === editModal) {
                closeEditModal();
            }
            if (event.target === importMemoryModal) {
                closeImportMemoryModal();
            }
        }

        // ========== 记忆管理功能 ==========
        
        // 导出记忆文件
        async function exportMemory(projectId, projectName) {
            try {
                showMessage('正在导出记忆文件...', 'success');
                const response = await fetch(`/api/config/memory/export/${projectId}`);
                
                if (!response.ok) {
                    showMessage('导出失败，项目可能没有记忆文件', 'error');
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                // 从响应头获取文件名，如果没有则生成默认文件名
                const contentDisposition = response.headers.get('Content-Disposition');
                let fileName = `${projectName}_memory.zip`;
                if (contentDisposition) {
                    const fileNameMatch = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                    if (fileNameMatch && fileNameMatch[1]) {
                        fileName = decodeURIComponent(fileNameMatch[1].replace(/['"]/g, ''));
                    }
                }
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showMessage('记忆文件导出成功', 'success');
            } catch (error) {
                console.error('导出记忆文件失败:', error);
                showMessage('导出失败：' + error.message, 'error');
            }
        }

        // 打开导入记忆模态框
        let currentImportProjectId = null;
        let currentImportProjectName = null;

        function openImportMemoryModal(projectId, projectName) {
            currentImportProjectId = projectId;
            currentImportProjectName = projectName;
            document.getElementById('importMemoryFile').value = '';
            document.getElementById('importFileInfo').textContent = '';
            document.getElementById('importMemorySubmitBtn').disabled = true;
            document.getElementById('importMemoryModal').classList.add('show');
        }

        // 关闭导入记忆模态框
        function closeImportMemoryModal() {
            document.getElementById('importMemoryModal').classList.remove('show');
            currentImportProjectId = null;
            currentImportProjectName = null;
        }

        // 处理文件选择
        function handleFileSelect(input) {
            const file = input.files[0];
            const fileInfo = document.getElementById('importFileInfo');
            const submitBtn = document.getElementById('importMemorySubmitBtn');

            if (!file) {
                fileInfo.textContent = '';
                submitBtn.disabled = true;
                return;
            }

            // 检查文件类型
            if (!file.name.toLowerCase().endsWith('.zip')) {
                showMessage('请选择 ZIP 格式的文件', 'error');
                input.value = '';
                submitBtn.disabled = true;
                return;
            }

            // 显示文件信息
            const fileSize = (file.size / 1024).toFixed(2);
            fileInfo.textContent = `已选择: ${file.name} (${fileSize} KB)`;
            submitBtn.disabled = false;
        }

        // 提交导入记忆
        async function submitImportMemory() {
            if (!currentImportProjectId) {
                showMessage('项目 ID 无效', 'error');
                return;
            }

            const fileInput = document.getElementById('importMemoryFile');
            if (!fileInput.files || fileInput.files.length === 0) {
                showMessage('请选择要导入的记忆文件', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const submitBtn = document.getElementById('importMemorySubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '导入中...';

            try {
                const response = await fetch(`/api/config/memory/import/${currentImportProjectId}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage(result.msg || '记忆文件导入成功', 'success');
                    closeImportMemoryModal();
                } else {
                    showMessage(result.msg || '导入失败', 'error');
                }
            } catch (error) {
                console.error('导入记忆文件失败:', error);
                showMessage('导入失败：' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '确认覆盖';
            }
        }
    </script>
    
    <!-- 引入导航栏 JS -->
    <script src="js/navbar.js"></script>
</body>
